name: CI/CD Pipeline - Build, Push & Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Triggers on version tags (e.g. v1.0.0, v2.1.3)
  workflow_dispatch: # Allows manual trigger of the pipeline from the GitHub UI

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone to speed up checkout

      # Step 2: Set up Docker Buildx (extended build capabilities)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub using secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Extract tags and labels dynamically
      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: suhasvarma/job-market-intelligence-analyzer
          tags: |
            # Tag 'latest' only on push to the main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag with the Git commit short SHA for build traceability
            type=sha,format=short,prefix=sha-
            # Tag with semantic versioning (e.g., v1.0.0) when git tag is pushed
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Step 5: Build and push the Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Native GitHub Actions caching to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Render
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Step 6: Trigger Render's Deploy Hook (Dynamic CD)
      - name: Trigger Render Deploy Hook
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Notifying Render of the new image update..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ] || [ "$RESPONSE" -eq 202 ]; then
            echo "Deploy hook successfully triggered on Render! HTTP Status: $RESPONSE"
          else
            echo "Failed to trigger Deploy Hook on Render. HTTP Status: $RESPONSE"
            exit 1
          fi
